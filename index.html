<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montgomery County Spatial Analysis</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 100%; width: 100%; background: #f8fafc; }
        .custom-tooltip { 
            background: white !important; 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 8px !important;
            padding: 8px !important;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "c113b395a568d62a02db2a565e8e600f5e1ae9f1";

        const App = () => {
            const [loading, setLoading] = useState(false);
            const [hasData, setHasData] = useState(false);
            const mapRef = useRef(null);
            const geoJsonLayerRef = useRef(null);

            useEffect(() => {
                if (!mapRef.current) {
                    mapRef.current = L.map('map').setView([32.3668, -86.3000], 11);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(mapRef.current);
                }
            }, []);

            const getColor = (d) => {
                return d > 80000 ? '#006d2c' :
                       d > 60000 ? '#31a354' :
                       d > 40000 ? '#74c476' :
                       d > 20000 ? '#bae4b3' : '#edf8e9';
            };

            const fetchData = async () => {
                setLoading(true);
                const acsUrl = `https://api.census.gov/data/2022/acs/acs5?get=NAME,B19013_001E,B01002_001E,B01003_001E&for=tract:*&in=state:01&in=county:101&key=${API_KEY}`;
                const tigerUrl = `https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Tracts_Blocks/MapServer/4/query?where=STATE%3D'01'%20AND%20COUNTY%3D'101'&outFields=GEOID,TRACT&returnGeometry=true&outSR=4326&f=geojson`;

                try {
                    const [acsRes, tigerRes] = await Promise.all([fetch(acsUrl), fetch(tigerUrl)]);
                    const acsData = await acsRes.json();
                    const tigerData = await tigerRes.json();

                    const statsLookup = new Map();
                    acsData.slice(1).forEach(row => {
                        const geoid = `${row[4]}${row[5]}${row[6]}`;
                        statsLookup.set(geoid, {
                            income: parseFloat(row[1]),
                            age: parseFloat(row[2]),
                            pop: parseInt(row[3])
                        });
                    });

                    if (geoJsonLayerRef.current) mapRef.current.removeLayer(geoJsonLayerRef.current);

                    geoJsonLayerRef.current = L.geoJson(tigerData, {
                        style: (f) => ({
                            fillColor: getColor(statsLookup.get(f.properties.GEOID)?.income || 0),
                            weight: 1, color: 'white', fillOpacity: 0.7
                        }),
                        onEachFeature: (f, layer) => {
                            const s = statsLookup.get(f.properties.GEOID);
                            layer.bindTooltip(`
                                <b>Tract ${f.properties.TRACT}</b><br/>
                                Income: $${s?.income?.toLocaleString() || 'N/A'}<br/>
                                Pop: ${s?.pop?.toLocaleString() || 'N/A'}
                            `, { sticky: true, className: 'custom-tooltip' });
                        }
                    }).addTo(mapRef.current);

                    setHasData(true);
                } catch (e) {
                    console.error(e);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen">
                    <header className="bg-white border-b p-4 flex justify-between items-center shadow-sm z-[1001]">
                        <div>
                            <h1 className="text-xl font-bold text-slate-800">Montgomery Census Map</h1>
                        </div>
                        {!hasData && !loading && (
                            <button onClick={fetchData} className="bg-blue-600 text-white px-6 py-2 rounded-full font-medium">
                                Load Census Data
                            </button>
                        )}
                    </header>

                    <main className="flex-1 relative">
                        {loading && (
                            <div className="absolute inset-0 z-[2000] bg-white/80 flex items-center justify-center font-bold">
                                Loading Data...
                            </div>
                        )}
                        <div id="map"></div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
