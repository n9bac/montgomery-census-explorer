<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montgomery County Census Explorer</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .leaflet-container { height: 100%; width: 100%; }
        .census-tooltip { 
            background: white !important; 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 0.5rem !important; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1) !important;
            padding: 0 !important;
            opacity: 1 !important;
        }
        .leaflet-tooltip-pane { z-index: 1000; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Import Map for ESM Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom": "https://esm.sh/react-dom@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "lucide-react": "https://esm.sh/lucide-react@0.454.0",
        "leaflet": "https://esm.sh/leaflet@1.9.4",
        "react-leaflet": "https://esm.sh/react-leaflet@4.2.1"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { MapContainer, TileLayer, GeoJSON } from 'react-leaflet';
        import { Loader2, Map as MapIcon, Database, Info } from 'lucide-react';
        import L from 'leaflet';

        const API_KEY = "c113b395a568d62a02db2a565e8e600f5e1ae9f1";
        const CENTER = [32.3668, -86.3000];
        const ZOOM = 10;

        const getColor = (d) => {
            return d > 80000 ? '#006d2c' : d > 60000 ? '#31a354' : d > 40000 ? '#74c476' : d > 20000 ? '#bae4b3' : '#edf8e9';
        };

        const style = (feature) => ({
            fillColor: getColor(feature.properties.income),
            weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7
        });

        const MapComponent = React.memo(({ geoData }) => {
            return React.createElement(MapContainer, { 
                key: "montgomery-county-map-standalone",
                id: "montgomery-county-map-standalone",
                center: CENTER, 
                zoom: ZOOM, 
                className: "h-full w-full",
                scrollWheelZoom: true
            },
                React.createElement(TileLayer, {
                    url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
                    attribution: '&copy; OSM'
                }),
                geoData && React.createElement(GeoJSON, {
                    key: geoData.features.length,
                    data: geoData,
                    style: style,
                    onEachFeature: (feature, layer) => {
                        const { TRACT, income, age, pop, edu } = feature.properties;
                        const tooltipContent = `
                            <div class="p-2 font-sans">
                                <p class="font-bold border-b border-slate-200 mb-1 pb-1 text-slate-800">Tract ${TRACT}</p>
                                <div class="space-y-1 text-xs">
                                    <p class="text-emerald-700 font-semibold">Income: $${(income || 0).toLocaleString()}</p>
                                    <p class="text-slate-600">Median Age: <span class="font-bold text-slate-800">${age || 'N/A'}</span></p>
                                    <p class="text-slate-600">Population: <span class="font-bold text-slate-800">${(pop || 0).toLocaleString()}</span></p>
                                    <p class="text-slate-600">Bachelor's Degree: <span class="font-bold text-slate-800">${edu || 0}%</span></p>
                                </div>
                            </div>
                        `;
                        layer.bindTooltip(tooltipContent, { sticky: true, className: 'census-tooltip' });
                        layer.on({
                            mouseover: (e) => { e.target.setStyle({ weight: 3, color: '#666', fillOpacity: 0.9 }); },
                            mouseout: (e) => { e.target.setStyle(style(feature)); }
                        });
                    }
                }),
                React.createElement('div', { className: "absolute bottom-8 right-8 bg-white p-4 rounded-lg shadow-xl z-[1000] border border-slate-200" },
                    React.createElement('p', { className: "text-xs font-bold uppercase text-slate-500 mb-2" }, "Median Income"),
                    [80000, 60000, 40000, 20000, 0].map((val) => 
                        React.createElement('div', { key: val, className: "flex items-center gap-2 mb-1" },
                            React.createElement('div', { className: "w-4 h-4 rounded", style: { backgroundColor: getColor(val + 1) } }),
                            React.createElement('span', { className: "text-xs text-slate-600" }, val > 0 ? `$${val.toLocaleString()}+` : 'Under $20k')
                        )
                    )
                )
            );
        });

        const App = () => {
            const [geoData, setGeoData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const fetchData = async () => {
                setLoading(true);
                setError(null);

                const acsUrl = `https://api.census.gov/data/2022/acs/acs5?get=NAME,B19013_001E,B01002_001E,B01003_001E,B15003_022E,B15003_001E&for=tract:*&in=state:01&in=county:101&key=${API_KEY}`;
                const tigerUrl = `https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Tracts_Blocks/MapServer/4/query?where=STATE%3D'01'%20AND%20COUNTY%3D'101'&outFields=GEOID,STATE,COUNTY,TRACT,NAME&returnGeometry=true&outSR=4326&f=geojson`;

                try {
                    const [acsRes, tigerRes] = await Promise.all([fetch(acsUrl), fetch(tigerUrl)]);
                    if (!acsRes.ok || !tigerRes.ok) throw new Error("Failed to fetch data from Census servers.");

                    const acsData = await acsRes.json();
                    const tigerData = await tigerRes.json();

                    const statsLookup = new Map();
                    acsData.slice(1).forEach((row) => {
                        const geoid = `${row[6]}${row[7]}${row[8]}`;
                        const bachelors = parseFloat(row[4]);
                        const totalEdu = parseFloat(row[5]);
                        const eduRate = totalEdu > 0 ? (bachelors / totalEdu) * 100 : 0;

                        statsLookup.set(geoid, {
                            income: parseFloat(row[1]),
                            age: parseFloat(row[2]),
                            pop: parseInt(row[3]),
                            edu: eduRate.toFixed(1)
                        });
                    });

                    tigerData.features = tigerData.features.map((feature) => {
                        const stats = statsLookup.get(feature.properties.GEOID);
                        return { ...feature, properties: { ...feature.properties, ...stats } };
                    });

                    setGeoData(tigerData);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return React.createElement('div', { className: "flex flex-col h-screen bg-slate-50 font-sans" },
                React.createElement('header', { className: "bg-white border-b border-slate-200 p-4 flex justify-between items-center z-[1000] shadow-sm" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-xl font-bold text-slate-800 flex items-center gap-2" },
                            React.createElement(MapIcon, { className: "text-blue-600" }), " Montgomery County Spatial Analysis"
                        ),
                        React.createElement('p', { className: "text-xs text-slate-500" }, "2022 ACS 5-Year Estimates + TIGER/Line Geometry")
                    ),
                    !geoData && !loading && React.createElement('button', {
                        onClick: fetchData,
                        className: "bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium transition-all shadow-lg flex items-center gap-2 cursor-pointer"
                    }, React.createElement(Database, { size: 18 }), " Load Census Map")
                ),
                React.createElement('main', { className: "flex-1 relative" },
                    loading && React.createElement('div', { className: "absolute inset-0 z-[2000] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center" },
                        React.createElement(Loader2, { className: "animate-spin text-blue-600 mb-4", size: 48 }),
                        React.createElement('p', { className: "text-lg font-semibold text-slate-700" }, "Merging Geometry & Demographics...")
                    ),
                    error && React.createElement('div', { className: "absolute inset-0 z-[2000] bg-white/90 flex items-center justify-center p-4" },
                        React.createElement('div', { className: "bg-red-50 border border-red-200 text-red-700 rounded-lg max-w-md p-6 shadow-xl" },
                            React.createElement('p', { className: "font-bold text-center mb-2" }, "Error Loading Data"),
                            React.createElement('p', { className: "text-sm text-center" }, error),
                            React.createElement('button', {
                                onClick: () => setError(null),
                                className: "mt-4 w-full bg-red-600 text-white py-2 rounded-md hover:bg-red-700 transition-colors"
                            }, "Dismiss")
                        )
                    ),
                    !geoData && !loading && !error && React.createElement('div', { className: "absolute inset-0 z-[1500] bg-slate-100/50 backdrop-blur-[2px] flex flex-col items-center justify-center text-slate-400 space-y-4" },
                        React.createElement('div', { className: "bg-white p-8 rounded-2xl shadow-2xl border border-slate-200 flex flex-col items-center max-w-sm text-center" },
                            React.createElement(Info, { size: 48, className: "text-blue-500 mb-4" }),
                            React.createElement('h3', { className: "text-slate-800 font-bold text-lg mb-2" }, "Ready to Analyze"),
                            React.createElement('p', { className: "text-sm text-slate-500 mb-6" }, 'Click "Load Census Map" in the top right to fetch real-time demographic data for Montgomery County.'),
                            React.createElement('button', {
                                onClick: fetchData,
                                className: "bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition-all shadow-lg flex items-center gap-2"
                            }, React.createElement(Database, { size: 20 }), " Load Data Now")
                        )
                    ),
                    React.createElement(MapComponent, { geoData: geoData })
                )
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
